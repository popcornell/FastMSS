n_jobs: 8
stage: 0
samplerate: 16000

output_dir: /lustre/fsn1/projects/rech/par/ulf22fh//librispeech-synth-noisy
hydra: # overrides standard hydra output dir
  run:
    dir: ${output_dir}

n_meetings: 5
min_max_spk: [2, 5] # min max speakers.
save_anechoic: True # save also anechoic
save_spk: True # save each speaker stream

duration: 600
manifest_prefix: librispeech
librispeech_dir: /lustre/fsn1/projects/rech/par/ulf22fh//LibriSpeech
librispeech_align: /lustre/fsn1/projects/rech/par/ulf22fh/LibriSpeechAlign/LibriSpeech
dset_splits:
  - train-clean-100
  - train-clean-360
split_fa_factor: 0.2
max_utt_duration: 60
min_utt_duration: 0.3
min_spk_utt: 5
use_markov: True

base_gain: [-35, -8]
rel_gain: [-12, +5]
add_noise: True
noise_rel_gain: [-24, 8]
speed_perturb: False # this makes generation reaaally slow.
speed_perturb_range: [0.95, 1.05]
use_fir: False

# these will be parsed and sampled randomly.
# probably good to sample based on length of each file.
# noise_sample_weighted: True
noise_folders:
  - /lustre/fswork/projects/rech/par/ulf22fh/FastMSS/wham_noise_16kHz/

filter_noise_len: 20 # remove shorter than 20 seconds

reverberate: True
n_rirs: 10
n_pos_rirs: 50
rt60: [0.1, 0.7]
room_sz: [5, 10]
room_ceiling: [3, 5]
delta_dist: 0.5  # min distance between walls and among speakers
use_rand_ism: False
rand_disp: 0.0 # if save anechoic this should be 0.0 probably

save_cutset: True
drop_without_align: True


mic_type: single
