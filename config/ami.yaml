n_jobs: 8
stage: 0
samplerate: 16000

hydra:
  run:
    dir: ./ami_synth_ihm

n_meetings: 10
min_max_spk: [1, 2] # min max speakers.
save_reverberant: True # save reverberant
save_anechoic: True # save also anechoic
save_spk: True # save each speaker stream

duration: 120
manifest_prefix: ami-ihm
output_dir: /disks/disk1/scornell/FastMSS
dset_splits:
  - train
split_fa_factor: 0.2
max_utt_duration: 60
min_utt_duration: 0.3
min_spk_utt: 5
use_markov: True

base_gain: [-35, -8]
rel_gain: [-12, +5]
add_noise: True
speed_perturb: False # this makes generalization slow.
use_fir: False

# these will be parsed and sampled randomly.
# probably good to sample based on length of each file.
# noise_sample_weighted: True
noise_folders:
  - /disks/disk1/scornell/FastMSS/wham_noise

reverberate: True
n_rirs: 100
n_pos_rirs: 50
rt60: [0.1, 0.4]
room_sz: [5, 10]
room_ceiling: [3, 5]
delta_dist: 0.5  # min distance between walls and among speakers
use_rand_ism: False
rand_disp: 0.0 # if save anechoic this should be 0.0 probably

save_cutset: True
drop_without_align: True


